<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card login-card shadow p-4" style="width: 100%; max-width: 400px;">
    <div class="text-center mb-3">
      <i class="bi bi-person-circle fs-1 text-success"></i>
    </div>
    <h2 class="text-center mb-3">Iniciar Sesión</h2>

    <div id="alerta" class="alert alert-danger d-none" role="alert">
      Usuario o contraseña incorrectos.
    </div>

    <div class="mb-3">
      <label for="usuario" class="form-label">Usuario</label>
      <input type="text" id="usuario" class="form-control" placeholder="Usuario" required />
    </div>
    <div class="mb-3">
      <label for="clave" class="form-label">Contraseña</label>
      <input type="password" id="clave" class="form-control" placeholder="Contraseña" required />
    </div>

    <div class="d-grid">
      <button id="btnLogin" class="btn btn-custom">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </div>

    <p class="text-muted text-center mt-3 mb-0" style="font-size: 0.85rem;">
      © 2025 - Sistema de Exámenes Inteligente
    </p>
  </div>
</div>
