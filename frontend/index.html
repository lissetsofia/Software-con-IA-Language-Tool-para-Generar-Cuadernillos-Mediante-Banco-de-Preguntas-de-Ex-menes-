<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mi App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="./login.css" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">

  <div id="header"></div>

  <main class="flex-fill container py-4">
    <div id="contenido"></div>
  </main>

  <div id="footer"></div>

  <script>
    // 👉 Cargar fragmentos HTML
    async function include(id, path) {
      const res = await fetch(path);
      const html = await res.text();
      document.getElementById(id).innerHTML = html;

      // Si se carga login.html, conectar el botón
      if (path.includes("login.html")) {
        setTimeout(() => {
          const boton = document.getElementById("btnLogin");
          if (boton) {
            boton.addEventListener("click", login);
          }
        }, 100);
      }
    }

    // 👉 Función de login
    async function login() {
      const usuario = document.getElementById("usuario").value;
      const clave = document.getElementById("clave").value;
      const alerta = document.getElementById("alerta");

      try {
        const res = await window.api.login(usuario, clave);
        if (res && res.exito) {
          alerta.classList.add("d-none");
          // Esperar al evento del backend
        } else {
          alerta.textContent = res.mensaje || "Usuario o contraseña incorrectos.";
          alerta.classList.remove("d-none");
          setTimeout(() => {
            alerta.classList.add("d-none");
          }, 4000);
        }
      } catch (err) {
        alerta.textContent = "Error al conectar con el backend.";
        alerta.classList.remove("d-none");
        console.error(err);
      }
    }

    // 👉 Escuchar evento de login exitoso
    window.api.onLoginExitoso(() => {
      include("contenido", "./home.html");
    });

    // 👉 Cargar componentes iniciales
    include("header", "./components/header.html");
    include("footer", "./components/footer.html");
    include("contenido", "./login.html");

    // 👉 Manejo de navegación interna (desde home.html)
    document.addEventListener("click", (e) => {
      // Botones de navegación en el panel
      if (e.target && e.target.matches(".nav-link")) {
        document.querySelectorAll(".nav-link").forEach(btn => btn.classList.remove("active"));
        e.target.classList.add("active");
      }

      // Botón de logout
      if (e.target && e.target.id === "btnLogout") {
        include("contenido", "./login.html");
      }
    });

    // 👉 Función usada dentro del contenido dinámico (como home.html)
    function mostrar(seccion) {
      const contenedor = document.getElementById("contenido-interno");
      if (!contenedor) return;

      if (seccion === "home") {
        contenedor.innerHTML = "<p>Sección: Home</p>";
      } else if (seccion === "configuracion") {
        contenedor.innerHTML = "<p>Sección: Configuración (próximamente)</p>";
      }
    }
  </script>

</body>
</html>
