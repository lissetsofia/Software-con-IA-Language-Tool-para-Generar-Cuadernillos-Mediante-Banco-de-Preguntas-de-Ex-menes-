  <body class="d-flex flex-column min-vh-100">
    <div id="header"></div>

    <main class="flex-grow-1 d-flex flex-column">
      <div id="contenido" class="flex-grow-1 d-flex flex-column"></div>
    </main>

    <div id="footer"></div>

   <script>
  async function include(id, path) {
    const res = await fetch(path);
    const html = await res.text();
    const cont = document.getElementById(id);
    if (!cont) return;
    cont.innerHTML = html;

    const esLogin = path.includes("login.html");
    if (id === "contenido") {
      const header = document.getElementById("header");
      const footer = document.getElementById("footer");
      if (header) header.style.display = esLogin ? "none" : "block";
      if (footer) footer.style.display = esLogin ? "none" : "block";

      if (esLogin) {
        // enganchar login
        setTimeout(() => {
          const boton = document.getElementById("btnLogin");
          if (boton) boton.addEventListener("click", login);
        }, 100);
      }
    }

    return Promise.resolve();
  }

  async function login() {
    const usuario = document.getElementById("usuario").value;
    const clave = document.getElementById("clave").value;
    const alerta = document.getElementById("alerta");

    try {
      const res = await window.api.login(usuario, clave);
      if (res && res.exito) {
        alerta.classList.add("d-none");
      } else {
        alerta.textContent =
          res.mensaje || "Usuario o contraseña incorrectos.";
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 4000);
      }
    } catch (err) {
      alerta.textContent = "Error al conectar con el backend.";
      alerta.classList.remove("d-none");
      console.error(err);
    }
  }

  // Cargar JS de página evitando duplicados
  // Cargar JS de página evitando duplicados (devuelve una Promise)
function cargarScriptPagina(src, key) {
  const existing = document.querySelector(`script[data-page-script="${key}"]`);

  // Si ya está cargado y marcado como "loaded"
  if (existing && existing.dataset.loaded === "1") {
    return Promise.resolve();
  }

  // Si existe pero aún no terminó de cargar, esperamos su "load"
  if (existing) {
    return new Promise((resolve) => {
      existing.addEventListener("load", resolve, { once: true });
    });
  }

  // Crear nuevo script
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = src;
    script.type = "text/javascript";
    script.defer = true;
    script.dataset.pageScript = key;
    script.onload = () => {
      script.dataset.loaded = "1";
      resolve();
    };
    script.onerror = (e) => {
      console.error("Error cargando script de página:", src, e);
      reject(e);
    };
    document.body.appendChild(script);
  });
}


  // Navegación principal
  // Navegación principal
async function cargarPagina(ruta, elemento) {
  // 1) primero carga el HTML en #contenido
  await include("contenido", `./${ruta}`);

  // 2) marca menú activo
  activarMenu(elemento);

  // 3) luego carga el JS específico (una sola vez) y ejecuta init
  if (ruta === "generacion_preguntas.html") {
    await cargarScriptPagina(
      "./generacion_preguntas.js",
      "generacion_preguntas"
    );

    if (typeof window.initGeneracionPreguntas === "function") {
      window.initGeneracionPreguntas();
    } else {
      console.warn("⚠️ initGeneracionPreguntas no está definido.");
    }
  } else if (ruta === "cuadernillos.html") {
    await cargarScriptPagina("./cuadernillos.js", "cuadernillos");
    if (typeof window.initCuadernillos === "function") {
      window.initCuadernillos(); // opcional si luego creas esto en cuadernillos.js
    }
  }
}


  function activarMenu(elemento) {
    document
      .querySelectorAll(".nav-link")
      .forEach((link) => link.classList.remove("active"));
    if (elemento) elemento.classList.add("active");
  }

  function mostrar(seccion) {
    const contenedor = document.getElementById("contenido-interno");
    if (!contenedor) return;

    contenedor.innerHTML =
      seccion === "home"
        ? "<p>Sección: Home</p>"
        : "<p>Sección: Configuración (próximamente)</p>";
  }

  // Al iniciar: mostrar login
  include("contenido", "./login.html");

  // Clicks globales (navbar + logout)
  document.addEventListener("click", (e) => {
    if (e.target?.matches(".nav-link")) {
      activarMenu(e.target);
    }

    if (e.target?.id === "btnLogout") {
      include("contenido", "./login.html").then(() => {
        const header = document.getElementById("header");
        const footer = document.getElementById("footer");
        if (header) header.style.display = "none";
        if (footer) footer.style.display = "none";
      });
    }
  });

  // Cargar header y footer una vez
  document.addEventListener("DOMContentLoaded", () => {
    const header = document.getElementById("header");
    if (header) {
      include("header", "./components/header.html");
    }

    const footer = document.getElementById("footer");
    if (footer) {
      include("footer", "./components/footer.html");
    }
  });

  // ⛔️ ELIMINAMOS esto, ya no queremos lanzar el evento solo una vez:
  // window.addEventListener("DOMContentLoaded", () => {
  //   document.dispatchEvent(new CustomEvent("pagina-generacion-cargada"));
  // });

  // Login exitoso desde preload.js
  window.api.onLoginExitoso(() => {
    include("header", "./components/header.html");
    include("footer", "./components/footer.html");
    // HOME por defecto
    include("contenido", "./home.html").then(() => {
      const homeLink = [...document.querySelectorAll(".nav-link")].find(
        (el) => el.textContent.trim() === "HOME"
      );
      activarMenu(homeLink);
    });
  });
</script>
