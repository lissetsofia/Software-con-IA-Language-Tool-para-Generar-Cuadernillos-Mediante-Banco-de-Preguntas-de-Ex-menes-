<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mi App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap y estilos -->
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="./css/index.css" />
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Header -->
  <div id="header"></div>

  <!-- Contenido principal -->
  <main class="container py-4 flex-grow-1">
    <div id="contenido"></div>
  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Script principal -->
  <script>
    async function include(id, path) {
      const res = await fetch(path);
      const html = await res.text();
      document.getElementById(id).innerHTML = html;

      const esLogin = path.includes("login.html");
      if (id === "contenido") {
        document.getElementById("header").style.display = esLogin ? "none" : "block";
        document.getElementById("footer").style.display = esLogin ? "none" : "block";

        if (esLogin) {
          setTimeout(() => {
            const boton = document.getElementById("btnLogin");
            if (boton) boton.addEventListener("click", login);
          }, 100);
        }
      }

      return Promise.resolve();
    }

    async function login() {
      const usuario = document.getElementById("usuario").value;
      const clave = document.getElementById("clave").value;
      const alerta = document.getElementById("alerta");

      try {
        const res = await window.api.login(usuario, clave);
        if (res && res.exito) {
          alerta.classList.add("d-none");
        } else {
          alerta.textContent = res.mensaje || "Usuario o contraseña incorrectos.";
          alerta.classList.remove("d-none");
          setTimeout(() => alerta.classList.add("d-none"), 4000);
        }
      } catch (err) {
        alerta.textContent = "Error al conectar con el backend.";
        alerta.classList.remove("d-none");
        console.error(err);
      }
    }

    window.api.onLoginExitoso(() => {
      include("header", "./components/header.html");
      include("footer", "./components/footer.html");
      include("contenido", "./home.html");

      const homeLink = [...document.querySelectorAll(".nav-link")]
        .find(el => el.textContent.trim() === "HOME");
      activarMenu(homeLink);
    });

    function cargarPagina(ruta, elemento) {
      include("contenido", `./${ruta}`);
      activarMenu(elemento);
    }

    function activarMenu(elemento) {
      document.querySelectorAll(".nav-link").forEach(link => link.classList.remove("active"));
      if (elemento) elemento.classList.add("active");
    }

    function mostrar(seccion) {
      const contenedor = document.getElementById("contenido-interno");
      if (!contenedor) return;

      if (seccion === "home") {
        contenedor.innerHTML = "<p>Sección: Home</p>";
      } else if (seccion === "configuracion") {
        contenedor.innerHTML = "<p>Sección: Configuración (próximamente)</p>";
      }
    }

    include("contenido", "./login.html");

    document.addEventListener("click", (e) => {
      if (e.target?.matches(".nav-link")) {
        activarMenu(e.target);
      }

      if (e.target?.id === "btnLogout") {
        include("contenido", "./login.html").then(() => {
          document.getElementById("header").style.display = "none";
          document.getElementById("footer").style.display = "none";
        });
      }
    });
  </script>

  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
