<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>EVALUNIA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="../node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="../node_modules/bootstrap-icons/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./css/index.css" />
    <!-- DataTables Bootstrap 5 CSS -->
    <!-- Bootstrap 5 CSS -->

    <!-- DataTables Bootstrap 5 CSS -->
    <link rel="stylesheet" href="./libs/bootstrap5.min.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div id="header"></div>

    <main class="flex-grow-1 d-flex flex-column">
      <div id="contenido" class="flex-grow-1 d-flex flex-column"></div>
    </main>

    <div id="footer"></div>

  <script>
  async function include(id, path) {
    const res = await fetch(path);
    const html = await res.text();
    const cont = document.getElementById(id);
    if (!cont) return;
    cont.innerHTML = html;

    const esLogin = path.includes("login.html");
    if (id === "contenido") {
      const header = document.getElementById("header");
      const footer = document.getElementById("footer");
      if (header) header.style.display = esLogin ? "none" : "block";
      if (footer) footer.style.display = esLogin ? "none" : "block";

      if (esLogin) {
        setTimeout(() => engancharLogin(), 0);
      }
    }

    return Promise.resolve();
  }

  function engancharLogin() {
    const form = document.getElementById("formLogin");
    if (form) {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (!form.reportValidity()) return;
        login();
      });
    }

    const toggleBtn = document.getElementById("btnTogglePassword");
    const clave = document.getElementById("clave");
    if (toggleBtn && clave) {
      const icon = toggleBtn.querySelector("i");
      toggleBtn.addEventListener("click", () => {
        clave.type = clave.type === "password" ? "text" : "password";
        const visible = clave.type === "text";
        toggleBtn.setAttribute("aria-pressed", visible ? "true" : "false");
        const label = visible ? "Ocultar contraseña" : "Mostrar contraseña";
        toggleBtn.setAttribute("aria-label", label);
        toggleBtn.setAttribute("title", label);
        if (icon) {
          icon.classList.toggle("bi-eye", !visible);
          icon.classList.toggle("bi-eye-slash", visible);
        }
      });
    }
  }

  async function login() {
    const usuario = document.getElementById("usuario").value;
    const clave = document.getElementById("clave").value;
    const alerta = document.getElementById("alerta");

    try {
      const res = await window.api.login(usuario, clave);
      if (res && res.status === "ok") {
        alerta.classList.add("d-none");
      } else {
        alerta.textContent =
          res.mensaje || "Usuario o contraseña incorrectos.";
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 4000);
      }
    } catch (err) {
      alerta.textContent = "Error al conectar con el backend.";
      alerta.classList.remove("d-none");
      console.error(err);
    }
  }

  // ================== Cargar JS de página evitando duplicados ==================
  function cargarScriptPagina(src, key) {
    const existing = document.querySelector(`script[data-page-script="${key}"]`);

    // Si ya está cargado y marcado como "loaded"
    if (existing && existing.dataset.loaded === "1") {
      return Promise.resolve();
    }

    // Si existe pero aún no terminó de cargar, esperamos su "load"
    if (existing) {
      return new Promise((resolve) => {
        existing.addEventListener("load", resolve, { once: true });
      });
    }

    // Crear nuevo script
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = src;
      script.type = "text/javascript";
      script.defer = true;
      script.dataset.pageScript = key;
      script.onload = () => {
        script.dataset.loaded = "1";
        resolve();
      };
      script.onerror = (e) => {
        console.error("Error cargando script de página:", src, e);
        reject(e);
      };
      document.body.appendChild(script);
    });
  }

  // ================== Navegación principal ==================
  async function cargarPagina(ruta, elemento) {
    // 1) primero carga el HTML en #contenido
    await include("contenido", `./${ruta}`);

    // 2) marca menú activo
    activarMenu(elemento);

    // 3) luego carga el JS específico (una sola vez) y ejecuta init
    if (ruta === "generacion_preguntas.html") {
      await cargarScriptPagina(
        "./generacion_preguntas.js",
        "generacion_preguntas"
      );

      if (typeof window.initGeneracionPreguntas === "function") {
        window.initGeneracionPreguntas();
      } else {
        console.warn("⚠️ initGeneracionPreguntas no está definido.");
      }

    } else if (ruta === "cuadernillos.html") {
      await cargarScriptPagina("./cuadernillos.js", "cuadernillos");
      if (typeof window.initCuadernillos === "function") {
        window.initCuadernillos(); // opcional si luego creas esto en cuadernillos.js
      }

    } else if (ruta === "corrector_ortografico.html") {
      // ⬅️ NUEVO: caso para el Corrector Ortográfico
      await cargarScriptPagina(
        "./corrector_ortografico.js",
        "corrector_ortografico"
      );

      // Si tienes una función init específica en ese JS, la llamas aquí
      if (typeof window.initCorrectorOrtografico === "function") {
        window.initCorrectorOrtografico();
      }

      // Si el modal está definido dentro de corrector_ortografico.html
      // y quieres que se abra automáticamente:
      const modalEl = document.getElementById("modalCorrector");
      if (modalEl && window.bootstrap) {
        const modal = new bootstrap.Modal(modalEl);
        modal.show();
      }
    }
  }

  function activarMenu(elemento) {
    document
      .querySelectorAll(".nav-link")
      .forEach((link) => link.classList.remove("active"));
    if (elemento) elemento.classList.add("active");
  }

  function mostrar(seccion) {
    const contenedor = document.getElementById("contenido-interno");
    if (!contenedor) return;

    contenedor.innerHTML =
      seccion === "home"
        ? "<p>Sección: Home</p>"
        : "<p>Sección: Configuración (próximamente)</p>";
  }

  // Al iniciar: mostrar login
  include("contenido", "./login.html");

  // Clicks globales (navbar + logout)
  document.addEventListener("click", (e) => {
    if (e.target?.matches(".nav-link")) {
      activarMenu(e.target);
    }

    if (e.target?.id === "btnLogout") {
      include("contenido", "./login.html").then(() => {
        const header = document.getElementById("header");
        const footer = document.getElementById("footer");
        if (header) header.style.display = "none";
        if (footer) footer.style.display = "none";
      });
    }
  });

  // Cargar header y footer una vez
  document.addEventListener("DOMContentLoaded", () => {
    const header = document.getElementById("header");
    if (header) {
      include("header", "./components/header.html");
    }

    const footer = document.getElementById("footer");
    if (footer) {
      include("footer", "./components/footer.html");
    }
  });

  // Login exitoso desde preload.js
  window.api.onLoginExitoso(() => {
    include("header", "./components/header.html");
    include("footer", "./components/footer.html");
    // HOME por defecto
    include("contenido", "./home.html").then(() => {
      const homeLink = document.querySelector(
        '.nav-link[onclick*="home.html"]'
      );
      activarMenu(homeLink || document.querySelector(".nav-link"));
    });
  });
</script>



    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery -->
    <script src="./libs/jquery.min.js"></script>

    <!-- DataTables core -->
    <script src="./libs/dataTables.min.js"></script>

    <!-- DataTables Bootstrap 5 integration -->
    <script src="./libs/dataTables.bootstrap5.min.js"></script>
  </body>
</html>
