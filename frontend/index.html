<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="../node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <!-- Bootstrap Icons (opcional para íconos) -->
    <link
      rel="stylesheet"
      href="../node_modules/bootstrap-icons/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="login.css">
  </head>
  <body
    class="bg-light d-flex justify-content-center align-items-center vh-100"
  >
    <div
      class="card login-card shadow p-4"
      style="width: 100%; max-width: 400px"
    >
      <div class="text-center mb-3">
        <i class="bi bi-person-circle fs-1 text-success"></i>
      </div>
      <h2 class="text-center mb-3">Iniciar Sesión</h2>

      <div id="alerta" class="alert alert-danger d-none" role="alert">
        Usuario o contraseña incorrectos.
      </div>

      <div class="mb-3">
        <label for="usuario" class="form-label">Usuario</label>
        <input
          type="text"
          id="usuario"
          class="form-control"
          placeholder="Usuario"
          required
        />
      </div>
      <div class="mb-3">
        <label for="clave" class="form-label">Contraseña</label>
        <input
          type="password"
          id="clave"
          class="form-control"
          placeholder="Contraseña"
          required
        />
      </div>
       <div class="d-grid">
        <button onclick="login()" class="btn btn-success"><i class="bi bi-box-arrow-in-right me-2"></i>Ingresar</button>
      </div>
      <br>
      <p class="text-muted text-center mt-3 mb-0" style="font-size: 0.85rem;">
        © 2025 - Sistema de Exámenes Inteligente
      </p>
      </div>
    </div>

    <script>
      async function login() {
        const usuario = document.getElementById("usuario").value;
        const clave = document.getElementById("clave").value;
        const alerta = document.getElementById("alerta");

        try {
          const res = await window.api.login(usuario, clave);
          if (res && res.exito) {
            alerta.classList.add("d-none");
            window.location.href = "home.html";
          } else {
            alerta.textContent =
              res.mensaje || "Usuario o contraseña incorrectos.";
            alerta.classList.remove("d-none");
            setTimeout(() => {
              alerta.classList.add("d-none");
            }, 4000);
          }
        } catch (err) {
          alerta.textContent = "Error al conectar con el backend.";
          alerta.classList.remove("d-none");
          console.error(err);
        }
      }
    </script>
  </body>
</html>
