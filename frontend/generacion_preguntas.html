<!-- CONTENIDO -->
<div class="p-3 d-flex flex-column align-items-center mt-generacion">
  <!-- CONTENEDOR -->
  <div class="card-contenedor w-75 mb-3 p-4">
    <div class="mb-3">
      <input type="text" class="form-control" placeholder="buscar">
    </div>

    <div class="card card-custom p-3 mb-3">
      <h6><strong>NOMBRE</strong></h6>
      <ul class="list-unstyled" id="lista-examenes"></ul>
    </div>

    <div class="d-flex justify-content-start grupo-tooltip">
      <button class="btn btn-azul">Importar</button>
      <div class="info-tooltip">
        <div class="tooltip-arrow"></div>
        <div class="tooltip-content">
          <strong>Información:</strong><br>
          El nombre del archivo debe tener la siguiente estructura:<br>
          Nombre, Número, Institución y Año.<br><br>
          <strong>Adicional:</strong> El botón se bloqueará una vez que se importe un archivo.<br>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTÓN QUE ABRE EL MODAL -->
  <div class="d-flex gap-3 mb-3 mt-4">
    <button class="btn btn-header" onclick="generarNuevoExamen()">Generar nuevo examen</button>
  </div>
</div>

<!-- MODAL QUE SE MUESTRA -->
<div id="modal-examen" class="modal-custom oculto">
  <div class="modal-content-custom">
    <button class="cerrar-modal" onclick="cerrarModalExamen()">✖</button>
    <div class="d-flex">
      <div class="grupo-lista me-4">
        <h6><strong>GRUPOS</strong></h6>
        <ul class="list-unstyled">
          <li>A <button>📄</button> <button>❌</button></li>
          <li>B <button>📄</button> <button>❌</button></li>
          <li>C <button>📄</button> <button>❌</button></li>
          <li>ES <button>📄</button></li>
        </ul>
        <button class="btn btn-custom mt-2">Generar</button>
      </div>
      <div class="pdf-vista">
        <div class="pdf-placeholder">visualización pdf</div>
        <div class="d-flex justify-content-between mt-3">
          <button class="btn btn-header">Exportar</button>
          <button class="btn btn-header">Generar nuevo examen</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- FUNCIONES JS -->
<script>
  function generarNuevoExamen() {
    const modal = document.getElementById("modal-examen");
    modal.classList.remove("oculto");
    modal.classList.add("mostrar-flex");
  }

  function cerrarModalExamen() {
    const modal = document.getElementById("modal-examen");
    modal.classList.remove("mostrar-flex");
    modal.classList.add("oculto");
  }
</script>
