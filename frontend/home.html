<!DOCTYPE html>
<html>
  <link
    rel="stylesheet"
    href="../node_modules/bootstrap/dist/css/bootstrap.min.css"
  />
  <head>
    <title>Home</title>
  </head>
  <body>
    <h1>🏠 Bienvenido al sistema</h1>
    <p>Este es el panel principal.</p>

    <nav>
      <button onclick="mostrar('home')">Home</button>
      <button onclick="mostrar('configuracion')">Configuración</button>
    </nav>

    <div id="contenido">
      <p>Sección: Home</p>
    </div>

    <script>
      function mostrar(seccion) {
        const contenido = document.getElementById("contenido");
        if (seccion === "home") {
          contenido.innerHTML = "<p>Sección: Home</p>";
        } else if (seccion === "configuracion") {
          contenido.innerHTML = "<p>Sección: Configuración (próximamente)</p>";
        }
      }
    </script>
  </body>
</html>
